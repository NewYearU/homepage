<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Macro–Micro Circulatory Prognostic Tool (Demo)</title>

<style>
body{margin:0;font-family:Arial;background:#f6f8fb}
.container{max-width:1100px;margin:40px auto;padding:20px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px}

input{padding:8px}
button{padding:10px 14px;background:#1f4e79;color:white;border:none;border-radius:8px}

.plot{border:1px solid #ccc;margin-top:10px}
</style>
</head>

<body>

<div class="container">

<h2>Macro–Micro Prognostic Tool</h2>

<div class="card">
<table>
<tr><td>Day1</td><td><input id="vti1"></td><td><input id="pi1"></td></tr>
<tr><td>Day2</td><td><input id="vti2"></td><td><input id="pi2"></td></tr>
<tr><td>Day3</td><td><input id="vti3"></td><td><input id="pi3"></td></tr>
</table>
<br>
<button onclick="analyze()">Analyze</button>
</div>

<div class="card">
<p id="states"></p>

<p><b>Trajectory:</b> <span id="traj"></span></p>
<p><b>Predicted risk:</b> <span id="prediction"></span></p>
<p id="interp"></p>

<svg id="plot" width="600" height="400" class="plot"></svg>
</div>

</div>

<script>

const VTI=16.9;
const PI=1.2;

/* 状态 */
function getState(v,p){
if(v>=VTI && p>=PI) return "Concordant high-flow";
if(v<VTI && p>=PI) return "Macro-predominant mismatch";
if(v>=VTI && p<PI) return "Micro-predominant mismatch";
return "Concordant low-flow";
}

/* 分组 */
function group(s){
if(s==="Concordant high-flow") return "high";
if(s==="Concordant low-flow") return "low";
return "mismatch";
}

/* 颜色（绿→黄→橙→红） */
function getColor(s){
if(s==="Concordant high-flow") return "#16a34a";
if(s==="Macro-predominant mismatch") return "#fde047";
if(s==="Micro-predominant mismatch") return "#f97316";
return "#dc2626";
}

/* trajectory + prediction */
function analyzeTrajectory(states){
let g=states.map(group);
let [g1,g2,g3]=g;

if(g1==="high"&&g2==="high"&&g3==="high"){
return ["Stable high-flow","Lower predicted risk"];
}

if(g1==="low"&&g2==="low"&&g3==="low"){
return ["Persistent low-flow","Higher predicted risk"];
}

if((g1!=="high")&&g3==="high"){
return ["Improving","Lower-to-intermediate risk"];
}

if(g1==="high"&&(g3!=="high")){
return ["Worsening","Intermediate-to-higher risk"];
}

return ["Fluctuating","Intermediate risk"];
}

function analyze(){

let v1=parseFloat(vti1.value),p1=parseFloat(pi1.value);
let v2=parseFloat(vti2.value),p2=parseFloat(pi2.value);
let v3=parseFloat(vti3.value),p3=parseFloat(pi3.value);

if([v1,p1,v2,p2,v3,p3].some(isNaN)){
alert("Fill all values");return;
}

let s1=getState(v1,p1);
let s2=getState(v2,p2);
let s3=getState(v3,p3);

states.innerHTML=
`Ordered states:<br>
Concordant high-flow → Macro mismatch → Micro mismatch → Concordant low-flow<br><br>
Day1: ${s1}<br>
Day2: ${s2}<br>
Day3: ${s3}`;

let result=analyzeTrajectory([s1,s2,s3]);

traj.innerText=result[0];
prediction.innerText=result[1];
interp.innerText="Framework-based prediction (demo only)";

draw([[v1,p1,s1],[v2,p2,s2],[v3,p3,s3]]);

}

function draw(points){

let svg=document.getElementById("plot");
svg.innerHTML="";

/* 坐标 */
function x(v){return 50+(v-10)*15;}
function y(p){return 350-(p*100);}

/* 四象限 */
svg.innerHTML+=`<rect x="50" y="0" width="200" height="200" fill="#fef9c3"/>`;   // Macro
svg.innerHTML+=`<rect x="250" y="0" width="300" height="200" fill="#dcfce7"/>`; // High
svg.innerHTML+=`<rect x="50" y="200" width="200" height="200" fill="#fee2e2"/>`; // Low
svg.innerHTML+=`<rect x="250" y="200" width="300" height="200" fill="#fed7aa"/>`; // Micro

/* cutoff */
svg.innerHTML+=`<line x1="250" y1="0" x2="250" y2="400" stroke="black"/>`;
svg.innerHTML+=`<line x1="50" y1="200" x2="600" y2="200" stroke="black"/>`;

/* trajectory */
for(let i=0;i<points.length;i++){
let [v,p,s]=points[i];
let cx=x(v),cy=y(p);

svg.innerHTML+=`<circle cx="${cx}" cy="${cy}" r="7" fill="${getColor(s)}"/>`;

if(i>0){
let [pv,pp]=points[i-1];
svg.innerHTML+=`<line x1="${x(pv)}" y1="${y(pp)}" x2="${cx}" y2="${cy}" stroke="#555" stroke-width="2"/>`;
}
}

}

</script>

</body>
</html>
