<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Macro–Micro Circulatory Prognostic Tool (Demo)</title>

<style>
:root{
--bg:#f6f8fb;--card:#fff;--text:#1f2937;--muted:#6b7280;
--line:#dbe2ea;--accent:#1f4e79;--radius:16px;
}

body{margin:0;font-family:-apple-system,Roboto;background:var(--bg);color:var(--text);}
.container{max-width:1100px;margin:40px auto;padding:20px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:20px;}

.state-high{background:#dcfce7}
.state-low{background:#fee2e2}
.state-macro{background:#fed7aa}
.state-micro{background:#fef9c3}

input{width:100%;padding:8px;border-radius:8px;border:1px solid #ccc;}
button{padding:10px 16px;border:none;border-radius:10px;background:#1f4e79;color:white;cursor:pointer;}

.plot{border:1px solid #ccc;border-radius:12px;margin-top:15px}
</style>
</head>

<body>

<div class="container">

<h1>Macro–Micro Prognostic Tool (Demo)</h1>

<div class="card">
<h3>Input</h3>

<table>
<tr><td>Day1</td><td><input id="vti1"></td><td><input id="pi1"></td></tr>
<tr><td>Day2</td><td><input id="vti2"></td><td><input id="pi2"></td></tr>
<tr><td>Day3</td><td><input id="vti3"></td><td><input id="pi3"></td></tr>
</table>

<br>
<button onclick="analyze()">Analyze</button>
</div>

<div class="card">
<h3>Results</h3>

<p id="states"></p>
<p><b>Trajectory:</b> <span id="traj"></span></p>
<p><b>Predicted risk:</b> <span id="risk"></span></p>
<p id="interp"></p>

<svg id="plot" width="600" height="400" class="plot"></svg>

</div>

</div>

<script>

const VTI=16.9;
const PI=1.2;

function state(v,p){
if(v>=VTI && p>=PI) return "High";
if(v<VTI && p<PI) return "Low";
if(v<VTI && p>=PI) return "Macro mismatch";
return "Micro mismatch";
}

function group(s){
if(s==="High") return "high";
if(s==="Low") return "low";
return "mismatch";
}

function analyze(){

let v1=parseFloat(vti1.value),p1=parseFloat(pi1.value);
let v2=parseFloat(vti2.value),p2=parseFloat(pi2.value);
let v3=parseFloat(vti3.value),p3=parseFloat(pi3.value);

if([v1,p1,v2,p2,v3,p3].some(isNaN)) return alert("Fill all values");

let s1=state(v1,p1),s2=state(v2,p2),s3=state(v3,p3);

states.innerHTML=`Day1: ${s1}<br>Day2: ${s2}<br>Day3: ${s3}`;

let g1=group(s1),g2=group(s2),g3=group(s3);

let traj="Fluctuating",risk="Intermediate";

if(g1==="high"&&g2==="high"&&g3==="high"){
traj="Stable high-flow";risk="Low";
}
else if(g1==="low"&&g2==="low"&&g3==="low"){
traj="Persistent low-flow";risk="High";
}
else if(g1==="high"&&(g3!=="high")){
traj="Worsening";risk="Intermediate→High";
}
else if((g1!=="high")&&g3==="high"){
traj="Improving";risk="Low→Intermediate";
}

trajEl=traj;
riskEl=risk;

traj.innerText=traj;
risk.innerText=risk;

interp.innerText="Framework-based risk estimation (demo only)";

draw(v1,p1,v2,p2,v3,p3);

}

function draw(v1,p1,v2,p2,v3,p3){

let svg=document.getElementById("plot");
svg.innerHTML="";

function x(v){return 50+(v-10)*15;}
function y(p){return 350-(p*100);}

svg.innerHTML+=`<rect x="50" y="0" width="200" height="200" fill="#fed7aa"/>`;
svg.innerHTML+=`<rect x="250" y="0" width="300" height="200" fill="#dcfce7"/>`;
svg.innerHTML+=`<rect x="50" y="200" width="200" height="200" fill="#fee2e2"/>`;
svg.innerHTML+=`<rect x="250" y="200" width="300" height="200" fill="#fef9c3"/>`;

svg.innerHTML+=`<line x1="250" y1="0" x2="250" y2="400" stroke="black"/>`;
svg.innerHTML+=`<line x1="50" y1="200" x2="600" y2="200" stroke="black"/>`;

let pts=[[v1,p1],[v2,p2],[v3,p3]];

for(let i=0;i<pts.length;i++){
let cx=x(pts[i][0]),cy=y(pts[i][1]);
svg.innerHTML+=`<circle cx="${cx}" cy="${cy}" r="6" fill="black"/>`;
if(i>0){
let px=x(pts[i-1][0]),py=y(pts[i-1][1]);
svg.innerHTML+=`<line x1="${px}" y1="${py}" x2="${cx}" y2="${cy}" stroke="black"/>`;
}
}

}

</script>

</body>
</html>
